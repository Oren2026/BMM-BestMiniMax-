<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mavis 新聞中心 - AI、能源、NVIDIA、科技資訊</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', system-ui, sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }
    
    .header {
      background: linear-gradient(135deg, #1a1f35, #2d1f4a);
      padding: 32px 40px;
      border-bottom: 1px solid #2a2a3a;
      position: relative;
    }
    .header h1 { font-size: 28px; color: #fff; margin-bottom: 8px; }
    .header p { font-size: 14px; color: #888; margin-bottom: 20px; }
    .header-actions { position: absolute; top: 32px; right: 40px; display: flex; gap: 12px; }
    .btn { background: #2563eb; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
    .btn:hover { background: #1d4ed8; transform: translateY(-1px); }
    
    .stats-row { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 20px; }
    .stat-chip {
      background: #1a1f35;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    .stat-chip .count { font-weight: 700; color: #fff; }
    
    /* Search & Filter */
    .controls {
      padding: 20px 40px;
      background: #161922;
      border-bottom: 1px solid #2a2a3a;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .search-box {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 12px 16px 12px 40px;
      background: #1a1f35;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
    }
    .search-box input:focus { outline: none; border-color: #2563eb; }
    .search-box::before { content: '🔍'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; }
    
    .filter-chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-chip {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid #2a2a4a;
      background: #1a1f35;
      color: #888;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .filter-chip:hover { border-color: #3b82f6; color: #fff; }
    .filter-chip.active { background: #2563eb; border-color: #2563eb; color: white; }
    
    /* News Grid */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
      padding: 32px 40px;
    }
    
    .news-card {
      background: #1a1f35;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .news-card:hover {
      border-color: #3b82f6;
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(37, 99, 235, 0.15);
    }
    
    .news-card-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #2a2a3a;
    }
    .category-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .category-badge.AI { background: #8b5cf620; color: #8b5cf6; }
    .category-badge.ENERGY { background: #f9731620; color: #f97316; }
    .category-badge.NVIDIA { background: #22c55e20; color: #22c55e; }
    .category-badge.ROBOTICS { background: #ec489920; color: #ec4899; }
    .category-badge.TECH { background: #3b82f620; color: #3b82f6; }
    
    .news-date { font-size: 12px; color: #666; margin-left: auto; }
    
    .news-card-body { padding: 20px; }
    .news-title { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 10px; line-height: 1.4; }
    .news-content { font-size: 13px; color: #999; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    
    .news-card-footer {
      padding: 12px 20px;
      border-top: 1px solid #2a2a3a;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .news-source { font-size: 12px; color: #666; }
    .news-tags { display: flex; gap: 6px; margin-left: auto; }
    .tag { font-size: 11px; padding: 2px 8px; background: #2a2a4a; border-radius: 4px; color: #888; }
    
    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #1a1f35;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      max-width: 700px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-header {
      padding: 24px;
      border-bottom: 1px solid #2a2a3a;
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }
    .modal-header .category-badge { margin-top: 4px; }
    .modal-title { font-size: 20px; font-weight: 700; color: #fff; flex: 1; }
    .modal-close {
      background: none;
      border: none;
      color: #888;
      font-size: 24px;
      cursor: pointer;
      padding: 4px 8px;
    }
    .modal-close:hover { color: #fff; }
    .modal-body { padding: 24px; }
    .modal-body p { font-size: 14px; color: #ccc; line-height: 1.8; margin-bottom: 16px; }
    .modal-meta { display: flex; gap: 16px; font-size: 12px; color: #666; margin-bottom: 20px; }
    .modal-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .modal-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #2563eb;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      margin-top: 16px;
    }
    .modal-link:hover { background: #1d4ed8; }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: #666;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 16px; }
    
    /* Responsive */
    @media (max-width: 768px) {
      .header { padding: 20px; }
      .header-actions { position: static; margin-top: 16px; }
      .controls { padding: 16px 20px; }
      .news-grid { padding: 20px; grid-template-columns: 1fr; }
    }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📰 Mavis 新聞中心</h1>
    <p>追蹤 AI、能源、NVIDIA 與科技最新動態</p>
    
    <div class="stats-row">
      <div class="stat-chip"><span class="count" id="total-count">0</span> 條新聞</div>
      <div class="stat-chip"><span class="count" id="ai-count">0</span> AI</div>
      <div class="stat-chip"><span class="count" id="energy-count">0</span> 能源</div>
      <div class="stat-chip"><span class="count" id="nvidia-count">0</span> NVIDIA</div>
      <div class="stat-chip"><span class="count" id="robotics-count">0</span> 機器人</div>
      <div class="stat-chip"><span class="count" id="tech-count">0</span> 科技</div>
    </div>
    
    <div class="header-actions">
      <button class="btn" onclick="loadNews()">🔄 刷新</button>
    </div>
  </div>
  
  <div class="controls">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="搜尋新聞標題或內容..." oninput="filterNews()">
    </div>
    <div class="filter-chips">
      <button class="filter-chip active" data-category="all" onclick="setCategory('all')">全部</button>
      <button class="filter-chip" data-category="AI" onclick="setCategory('AI')">🤖 AI</button>
      <button class="filter-chip" data-category="ENERGY" onclick="setCategory('ENERGY')">⚡ 能源</button>
      <button class="filter-chip" data-category="NVIDIA" onclick="setCategory('NVIDIA')">🎨 NVIDIA</button>
      <button class="filter-chip" data-category="ROBOTICS" onclick="setCategory('ROBOTICS')">🦾 機器人</button>
      <button class="filter-chip" data-category="TECH" onclick="setCategory('TECH')">💻 科技</button>
    </div>
  </div>
  
  <div class="news-grid" id="news-grid">
    <div class="empty-state">
      <div class="icon">📭</div>
      <p>載入中...</p>
    </div>
  </div>
  
  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span class="category-badge" id="modal-category">AI</span>
        <h2 class="modal-title" id="modal-title">新聞標題</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-meta">
          <span id="modal-source">來源</span>
          <span id="modal-date">2026-01-01</span>
        </div>
        <p id="modal-content">新聞內容...</p>
        <div class="modal-tags" id="modal-tags"></div>
        <a href="#" target="_blank" class="modal-link" id="modal-link">🔗 閱讀原文</a>
      </div>
    </div>
  </div>
  
  <script>
    let allNews = [];
    let currentCategory = 'all';
    let searchQuery = '';
    
    const categoryColors = {
      AI: '#8b5cf6',
      ENERGY: '#f97316',
      NVIDIA: '#22c55e',
      ROBOTICS: '#ec4899',
      TECH: '#3b82f6'
    };
    
    const categoryIcons = {
      AI: '🤖',
      ENERGY: '⚡',
      NVIDIA: '🎨',
      ROBOTICS: '🦾',
      TECH: '💻'
    };
    
    async function loadNews() {
      try {
        // Try to load from GitHub first
        const response = await fetch('https://raw.githubusercontent.com/Oren2026/BMM-BestMiniMax-/master/data/news.json');
        if (response.ok) {
          const data = await response.json();
          allNews = data.news || [];
        } else {
          throw new Error('Failed to fetch from GitHub');
        }
      } catch (e) {
        // Fallback: try local path (for development)
        try {
          const response = await fetch('data/news.json');
          if (response.ok) {
            const data = await response.json();
            allNews = data.news || [];
          } else {
            throw new Error('Failed to fetch local');
          }
        } catch (e2) {
          // Last resort: use embedded data
          allNews = getEmbeddedNews();
        }
      }
      
      renderStats();
      filterNews();
    }
    
    function getEmbeddedNews() {
      // Embedded minimal data as fallback
      return [
        { id: 'N001', title: '請連線至 GitHub 獲取完整新聞', content: '請檢查網路連線或等待載入完整數據', category: 'AI', source: 'Mavis', publishedAt: '2026-06-02', tags: [] }
      ];
    }
    
    function renderStats() {
      const counts = { AI: 0, ENERGY: 0, NVIDIA: 0, ROBOTICS: 0, TECH: 0 };
      allNews.forEach(n => counts[n.category] = (counts[n.category] || 0) + 1);
      
      document.getElementById('total-count').textContent = allNews.length;
      document.getElementById('ai-count').textContent = counts.AI;
      document.getElementById('energy-count').textContent = counts.ENERGY;
      document.getElementById('nvidia-count').textContent = counts.NVIDIA;
      document.getElementById('robotics-count').textContent = counts.ROBOTICS;
      document.getElementById('tech-count').textContent = counts.TECH;
    }
    
    function setCategory(category) {
      currentCategory = category;
      document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.classList.toggle('active', chip.dataset.category === category);
      });
      filterNews();
    }
    
    function filterNews() {
      searchQuery = document.getElementById('search-input').value.toLowerCase();
      
      const filtered = allNews.filter(news => {
        const matchCategory = currentCategory === 'all' || news.category === currentCategory;
        const matchSearch = !searchQuery || 
          news.title.toLowerCase().includes(searchQuery) || 
          news.content.toLowerCase().includes(searchQuery) ||
          (news.tags && news.tags.some(t => t.toLowerCase().includes(searchQuery)));
        return matchCategory && matchSearch;
      });
      
      renderNews(filtered);
    }
    
    function renderNews(newsList) {
      const grid = document.getElementById('news-grid');
      
      if (newsList.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <div class="icon">🔍</div>
            <p>找不到符合條件的新聞</p>
          </div>
        `;
        return;
      }
      
      grid.innerHTML = newsList.map(news => `
        <div class="news-card" onclick="openModal('${news.id}')">
          <div class="news-card-header">
            <span class="category-badge ${news.category}">${categoryIcons[news.category] || '📰'} ${news.category}</span>
            <span class="news-date">${formatDate(news.publishedAt)}</span>
          </div>
          <div class="news-card-body">
            <h3 class="news-title">${news.title}</h3>
            <p class="news-content">${news.content}</p>
          </div>
          <div class="news-card-footer">
            <span class="news-source">${news.source || '未知來源'}</span>
            <div class="news-tags">
              ${(news.tags || []).slice(0, 2).map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
          </div>
        </div>
      `).join('');
    }
    
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      return `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')}`;
    }
    
    function openModal(newsId) {
      const news = allNews.find(n => n.id === newsId);
      if (!news) return;
      
      document.getElementById('modal-category').textContent = `${categoryIcons[news.category] || '📰'} ${news.category}`;
      document.getElementById('modal-category').className = `category-badge ${news.category}`;
      document.getElementById('modal-title').textContent = news.title;
      document.getElementById('modal-content').textContent = news.content;
      document.getElementById('modal-source').textContent = news.source || '未知來源';
      document.getElementById('modal-date').textContent = formatDate(news.publishedAt);
      
      const tagsContainer = document.getElementById('modal-tags');
      tagsContainer.innerHTML = (news.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
      
      const linkEl = document.getElementById('modal-link');
      if (news.url) {
        linkEl.href = news.url;
        linkEl.style.display = 'inline-flex';
      } else {
        linkEl.style.display = 'none';
      }
      
      document.getElementById('modal-overlay').classList.add('show');
      document.body.style.overflow = 'hidden';
    }
    
    function closeModal(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById('modal-overlay').classList.remove('show');
      document.body.style.overflow = '';
    }
    
    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });
    
    // Initial load
    loadNews();
  </script>
</body>
</html>
